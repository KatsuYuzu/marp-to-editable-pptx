name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate DOM walker script
        run: node src/native-pptx/scripts/generate-dom-walker-script.js

      - name: Type check
        run: npm run compile

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
