name: Update Screenshots

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      # when the native-pptx engine changes
      - 'src/native-pptx/**'
      # when the screenshot generation script changes
      - 'scripts/gen-html-screenshots.js'
  workflow_dispatch: {}  # run manually from the Actions tab at any time

concurrency:
  group: screenshots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    name: Generate slide screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Generate DOM walker script
        run: node src/native-pptx/scripts/generate-dom-walker-script.js

      - name: Build native-pptx standalone bundle
        run: node src/native-pptx/scripts/build-native-pptx-bundle.js

      # ── Install system tools ────────────────────────────────────────────────
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Install LibreOffice and ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice imagemagick poppler-utils

      # ── Generate HTML from test fixture ────────────────────────────────────
      # Output HTML next to the source MD so relative image paths (./test-icon.png)
      # resolve to files that already exist in the same directory.
      # marp-cli keeps images as relative src= references even with --allow-local-files.
      - name: Convert Markdown to HTML
        run: |
          npx @marp-team/marp-cli \
            src/native-pptx/test-fixtures/pptx-export.md \
            -o src/native-pptx/test-fixtures/slides-ci.html \
            --allow-local-files \
            --html

      # ── Generate PPTX from HTML ─────────────────────────────────────────────
      - name: Generate PPTX
        run: |
          node src/native-pptx/tools/gen-pptx.js \
            src/native-pptx/test-fixtures/slides-ci.html \
            /tmp/slides.pptx
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          MARP_PPTX_DEBUG: '1'

      # ── HTML → PNG (Puppeteer) ──────────────────────────────────────────────
      - name: Screenshot HTML slides
        run: |
          node scripts/gen-html-screenshots.js \
            src/native-pptx/test-fixtures/slides-ci.html \
            /tmp/html-slides
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      # ── PPTX → PNG (LibreOffice + pdftoppm) ───────────────────────────────
      - name: Convert PPTX slides to PNG
        run: |
          mkdir -p /tmp/pptx-slides
          # Step 1: PPTX → PDF (LibreOffice)
          libreoffice \
            --headless \
            --convert-to pdf \
            --outdir /tmp \
            /tmp/slides.pptx
          # Step 2: PDF → per-slide PNG (pdftoppm, 150 dpi ≈ 1280×720)
          pdftoppm \
            -r 150 \
            -png \
            /tmp/slides.pdf \
            /tmp/pptx-slides/pptx-slide
          # pdftoppm names files pptx-slide-1.png, pptx-slide-2.png, ...
          # Normalize to pptx-slide-001.png, pptx-slide-002.png, ...
          node -e "
          const fs = require('fs')
          const path = require('path')
          const dir = '/tmp/pptx-slides'
          const files = fs.readdirSync(dir)
            .filter(f => f.endsWith('.png'))
            .sort((a, b) => {
              const n = x => parseInt(x.match(/(\d+)\.png$/)?.[1] ?? '0', 10)
              return n(a) - n(b)
            })
          files.forEach((f, i) => {
            const newName = 'pptx-slide-' + String(i + 1).padStart(3, '0') + '.png'
            fs.renameSync(path.join(dir, f), path.join(dir, newName))
            console.log(f, '->', newName)
          })
          "

      # ── Side-by-side comparison (ImageMagick) ──────────────────────────────
      - name: Create side-by-side comparison images
        run: |
          mkdir -p /tmp/compare
          html_count=$(ls /tmp/html-slides/html-slide-*.png 2>/dev/null | wc -l)
          pptx_count=$(ls /tmp/pptx-slides/pptx-slide-*.png 2>/dev/null | wc -l)
          count=$((html_count < pptx_count ? html_count : pptx_count))
          echo "Creating $count comparison images"
          for i in $(seq 1 $count); do
            n=$(printf "%03d" $i)
            # Normalize both images to the same height (720px) before appending
            # so the HTML (1280x720) and PPTX (varies by DPI) appear at equal scale.
            convert \
              \( /tmp/html-slides/html-slide-${n}.png -resize x720 \) \
              \( /tmp/pptx-slides/pptx-slide-${n}.png -resize x720 \) \
              +append \
              /tmp/compare/compare-${n}.png
            echo "  compare-${n}.png"
          done

      # ── Per-slide visual diff report (RMSE) ────────────────────────────────
      # Measure RMSE between HTML and PPTX renders for each slide.
      # This step NEVER fails the job; it only logs metrics so regressions
      # can be spotted in CI logs and in the compare images on gh-pages.
      # If RMSE exceeds 0.20 (20% pixel deviation) on any slide, a warning is
      # emitted so engineers know the slide needs investigation.
      # Note: HTML vs PPTX will always have rendering differences (font hinting,
      # DPI normalization, LibreOffice rendering).  Threshold is set high enough
      # to allow those differences while catching complete rendering failures.
      - name: Visual diff report (per-slide RMSE)
        continue-on-error: true
        run: |
          html_count=$(ls /tmp/html-slides/html-slide-*.png 2>/dev/null | wc -l)
          pptx_count=$(ls /tmp/pptx-slides/pptx-slide-*.png 2>/dev/null | wc -l)
          count=$((html_count < pptx_count ? html_count : pptx_count))
          echo "=== Visual Diff Report (HTML vs PPTX, RMSE per slide) ==="
          warn_count=0
          for i in $(seq 1 $count); do
            n=$(printf "%03d" $i)
            html_img=/tmp/html-slides/html-slide-${n}.png
            pptx_img=/tmp/pptx-slides/pptx-slide-${n}.png
            # compare -metric RMSE prints "N.NNN (N.NNN)" to stderr; extract first float
            rmse=$(compare -metric RMSE \
              \( $html_img -resize x720 \) \
              \( $pptx_img -resize x720 \) \
              /dev/null 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1 || echo "N/A")
            if [ "$rmse" != "N/A" ]; then
              cmp=$(echo "$rmse > 0.20" | bc -l 2>/dev/null || echo 0)
              if [ "$cmp" = "1" ]; then
                echo "  [WARN] slide $n  RMSE=$rmse  (>0.20 — check compare-${n}.png)"
                warn_count=$((warn_count + 1))
              else
                echo "  [  OK] slide $n  RMSE=$rmse"
              fi
            else
              echo "  [SKIP] slide $n  (compare error)"
            fi
          done
          echo "=== Warnings: $warn_count slides exceeded threshold ==="

      # ── Collect all images ──────────────────────────────────────────────────
      - name: Collect screenshots
        run: |
          mkdir -p /tmp/gh-pages
          cp /tmp/html-slides/*.png  /tmp/gh-pages/ 2>/dev/null || true
          cp /tmp/pptx-slides/*.png  /tmp/gh-pages/ 2>/dev/null || true
          cp /tmp/compare/*.png      /tmp/gh-pages/ 2>/dev/null || true
          ls -la /tmp/gh-pages/

      # ── Publish to gh-pages ─────────────────────────────────────────────────
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          destination_dir: screenshots
          keep_files: false
          enable_jekyll: false
          commit_message: 'chore: update slide screenshots [${{ github.ref_name }}]'
      # ── Commit output-pptx back to the repository ────────────────────────
      # output-pptx/test-output.pptx and .json let end users download the
      # latest generated PPTX directly from the repository without running
      # the toolchain locally.
      # Note: pushing output-pptx/** does NOT re-trigger this workflow because
      # those paths are outside the `paths` filter above.
      - name: Update output-pptx in repository
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          cp /tmp/slides.pptx output-pptx/test-output.pptx
          cp /tmp/slides.json output-pptx/test-output.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output-pptx/test-output.pptx output-pptx/test-output.json
          if git diff --staged --quiet; then
            echo "output-pptx: no changes, skipping commit"
          else
            git commit -m "chore: update output-pptx [${{ github.ref_name }}]"
            git push origin HEAD:${{ github.ref_name }}
          fi